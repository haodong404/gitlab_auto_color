<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitLab Auto Color — Settings</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        margin: 24px;
        max-width: 820px;
      }
      h1 {
        margin-top: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .card {
        border: 1px solid #ccc;
        border-radius: 10px;
        padding: 14px;
      }
      .row {
        margin-bottom: 10px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input[type='text'], select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
      }
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
      }
      button {
        padding: 8px 14px;
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
        min-height: 22px;
      }
      code {
        user-select: all;
      }
    </style>
  </head>
  <body>
    <h1>GitLab Auto Color — Settings</h1>

    <div class="row" style="margin-bottom: 16px">
      <label for="gitlabDomain">GitLab Domain</label>
      <input id="gitlabDomain" type="text" placeholder="e.g. git.company.com" style="max-width: 400px" />
      <p style="margin: 4px 0 0; font-size: 0.85em; color: #666">
        After changing the domain, click Save — content scripts are re-registered automatically, no reinstall needed.
      </p>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Dark mode</h2>
        <div class="row">
          <label for="darkColorTheme">Color Theme</label>
          <select id="darkColorTheme">
            <option value="1">Indigo</option>
            <option value="6">Light Indigo</option>
            <option value="4">Blue</option>
            <option value="7">Light Blue</option>
            <option value="5">Green</option>
            <option value="8">Light Green</option>
            <option value="9">Red</option>
            <option value="10">Light Red</option>
            <option value="2">Gray</option>
            <option value="3">Light Gray</option>
            <option value="11">Dark Mode (alpha)</option>
          </select>
        </div>
        <div class="row">
          <label for="darkSyntaxTheme">Syntax Highlighting Theme</label>
          <select id="darkSyntaxTheme">
            <option value="1">Light</option>
            <option value="2">Dark</option>
            <option value="3">Solarized Light</option>
            <option value="4">Solarized Dark</option>
            <option value="5">Monokai</option>
            <option value="6">None</option>
          </select>
        </div>
      </section>

      <section class="card">
        <h2>Light mode</h2>
        <div class="row">
          <label for="lightColorTheme">Color Theme</label>
          <select id="lightColorTheme">
            <option value="1">Indigo</option>
            <option value="6">Light Indigo</option>
            <option value="4">Blue</option>
            <option value="7">Light Blue</option>
            <option value="5">Green</option>
            <option value="8">Light Green</option>
            <option value="9">Red</option>
            <option value="10">Light Red</option>
            <option value="2">Gray</option>
            <option value="3">Light Gray</option>
            <option value="11">Dark Mode (alpha)</option>
          </select>
        </div>
        <div class="row">
          <label for="lightSyntaxTheme">Syntax Highlighting Theme</label>
          <select id="lightSyntaxTheme">
            <option value="1">Light</option>
            <option value="2">Dark</option>
            <option value="3">Solarized Light</option>
            <option value="4">Solarized Dark</option>
            <option value="5">Monokai</option>
            <option value="6">None</option>
          </select>
        </div>
      </section>
    </div>

    <div class="row" style="margin-top: 14px">
      <label>
        <input id="autoSave" type="checkbox" />
        Auto-save after applying
      </label>
    </div>

    <div class="actions">
      <button id="saveBtn">Save settings</button>
      <button id="applyNowBtn" type="button">Apply now to open preferences tab</button>
    </div>

    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
